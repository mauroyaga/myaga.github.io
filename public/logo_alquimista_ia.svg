<!-- ============================================== -->
<!-- PROLONGAMENTOS RADIAIS A PARTIR DE CADA VÉRTICE -->
<!-- Cada linha começa na borda externa da junta     -->
<!-- (raio 14 a partir do centro do vértice) e vai   -->
<!-- 40px mais adiante na mesma direção radial       -->
<!-- ============================================== -->

<!-- v0 topo (340,90), direção (0,-1)
     início: (340, 76), fim: (340, 36) -->
<line x1="340" y1="76" x2="340" y2="36" style="fill:none;stroke:rgb(96, 165, 250);color:rgb(255, 255, 255);stroke-width:24px;stroke-linecap:square;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- v1 (478.56,170), direção (+0.866,-0.5)
     início: (478.56+14*0.866, 170+14*(-0.5)) = (490.68, 163)
     fim:    (490.68+40*0.866, 163+40*(-0.5)) = (525.32, 143) -->
<line x1="490.68" y1="163" x2="525.32" y2="143" style="fill:none;stroke:rgb(96, 165, 250);color:rgb(255, 255, 255);stroke-width:24px;stroke-linecap:square;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- v2 (478.56,330), direção (+0.866,+0.5)
     início: (490.68, 337)
     fim:    (525.32, 357) -->
<line x1="490.68" y1="337" x2="525.32" y2="357" style="fill:none;stroke:rgb(96, 165, 250);color:rgb(255, 255, 255);stroke-width:24px;stroke-linecap:square;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- v3 base (340,410), direção (0,+1)
     início: (340, 424), fim: (340, 464) -->
<line x1="340" y1="424" x2="340" y2="464" style="fill:none;stroke:rgb(96, 165, 250);color:rgb(255, 255, 255);stroke-width:24px;stroke-linecap:square;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- v4 (201.44,330), direção (-0.866,+0.5)
     início: (201.44-14*0.866, 330+14*0.5) = (189.32, 337)
     fim:    (189.32-40*0.866, 337+40*0.5) = (154.68, 357) -->
<line x1="189.32" y1="337" x2="154.68" y2="357" style="fill:none;stroke:rgb(96, 165, 250);color:rgb(255, 255, 255);stroke-width:24px;stroke-linecap:square;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- v5 (201.44,170), direção (-0.866,-0.5)
     início: (189.32, 163), fim: (154.68, 143) -->
<line x1="189.32" y1="163" x2="154.68" y2="143" style="fill:none;stroke:rgb(96, 165, 250);color:rgb(255, 255, 255);stroke-width:24px;stroke-linecap:square;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

