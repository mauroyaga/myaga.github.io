<line x1="465.06" y1="337.8" x2="353.5" y2="402.2" style="fill:none;stroke:rgb(96, 165, 250);color:rgb(255, 255, 255);stroke-width:24px;stroke-linecap:square;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
