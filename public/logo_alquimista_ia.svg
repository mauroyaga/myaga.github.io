<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo Alquimista</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo Alquimista: hexágono com juntas e prolongamentos nos vértices</desc>
<defs>

</defs>

<!-- ============================================== -->
<!-- Hexágono pointy-top, centro (340,250), raio 160 -->
<!-- Círculo aromático raio 160/φ ≈ 98.89            -->
<!--                                                 -->
<!-- Vértices e direção radial (do centro p/ vértice)-->
<!--  v0 topo:       (340,  90)   direção (0, -1)    -->
<!--  v1 dir-cima:   (478.56,170) direção (+0.866,-0.5)-->
<!--  v2 dir-baixo:  (478.56,330) direção (+0.866,+0.5)-->
<!--  v3 base:       (340, 410)   direção (0, +1)    -->
<!--  v4 esq-baixo:  (201.44,330) direção (-0.866,+0.5)-->
<!--  v5 esq-cima:   (201.44,170) direção (-0.866,-0.5)-->
<!--                                                 -->
<!-- Prolongamentos: linhas saindo de cada junta      -->
<!-- radialmente para fora, com 40px de comprimento   -->
<!-- ============================================== -->

<!-- Lados do hexágono -->
<line x1="353.5" y1="97.8" x2="465.06" y2="162.2" style="fill:none;stroke:rgb(96, 165, 250);color:rgb(255, 255, 255);stroke-width:24px;stroke-linecap:square;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
